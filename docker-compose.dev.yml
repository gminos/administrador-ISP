services:
  web:
    build: .
    container_name: conexiones_dev_web
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./:/app
      - /app/.venv
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: conexiones_dev_redis
    ports:
      - "6379:6379"

  db:
    image: postgres:17.5
    container_name: conexiones_dev_db
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  celery_worker:
    build: .
    container_name: conexiones_dev_celery_worker
    command: uv run celery -A conexiones worker -l info
    volumes:
      - ./:/app
      - /app/.venv
      - /app/.uv-cache
    env_file:
      - .env.dev
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    container_name: conexiones_dev_celery_beat
    command: uv run celery -A conexiones beat -l info
    volumes:
      - ./:/app
      - /app/.venv
      - /app/.uv-cache
    env_file:
      - .env.dev
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
      - redis

volumes:
  postgres_data_dev:
