<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio Suspendido</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='%23ef4444'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /%3E%3C/svg%3E">
    <style>
        :root {
            --bg-color: #f9fafb; /* gray-50 */
            --text-color: #111827; /* gray-900 */
            --card-bg: #ffffff;
            --border-color: #e5e7eb; /* gray-200 */
            --primary: #059669; /* emerald-600 */
            --danger: #dc2626; /* red-600 */
            --text-muted: #6b7280; /* gray-500 */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a; /* slate-900 */
                --text-color: #f8fafc; /* slate-50 */
                --card-bg: #1e293b; /* slate-800 */
                --border-color: #334155; /* slate-700 */
                --primary: #10b981; /* emerald-500 */
                --danger: #ef4444; /* red-500 */
                --text-muted: #94a3b8; /* slate-400 */
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .icon {
            width: 64px;
            height: 64px;
            color: var(--danger);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 24px 0;
        }

        .footer {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h1>Servicio Suspendido</h1>
        <p>
            El acceso a esta plataforma ha sido suspendido temporalmente. 
            Si eres un usuario, por favor contacta al administrador o proveedor del servicio.
        </p>
        <p>
            Si eres el administrador, verifica el estado de tu cuenta de facturación.
        </p>
        <div class="footer">
            Plataforma de Gestión ISP
        </div>
    </div>
</body>
</html>
