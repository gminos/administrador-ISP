services:
  web:
    build: .
    container_name: conexiones_prod_web
    volumes:
      - ./clientes:/app/clientes
      - ./conexiones:/app/conexiones
      - ./facturacion:/app/facturacion
      - ./instalaciones:/app/instalaciones
      - ./planes:/app/planes
      - ./templates:/app/templates
      - ./base:/app/base
      - ./usuarios:/app/usuarios
      - ./nucleo_admin:/app/nucleo_admin
      - ./usuarios:/app/usuarios
      - ./nucleo_admin:/app/nucleo_admin
      - static_data:/app/staticfiles
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
    restart: always

  redis:
    image: redis:7-alpine
    container_name: conexiones_prod_redis
    restart: always

  db:
    image: postgres:17.5
    container_name: conexiones_prod_db
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  nginx:
    image: nginx:alpine
    container_name: conexiones_prod_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles
    depends_on:
      - web
    restart: always

  celery_worker:
    build: .
    container_name: conexiones_prod_celery_worker
    command: uv run celery -A conexiones worker -l info
    volumes:
      - ./clientes:/app/clientes
      - ./conexiones:/app/conexiones
      - ./facturacion:/app/facturacion
      - ./instalaciones:/app/instalaciones
      - ./planes:/app/planes
      - ./templates:/app/templates
      - ./base:/app/base
      - ./usuarios:/app/usuarios
      - ./nucleo_admin:/app/nucleo_admin
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
      - redis
    restart: always

  celery_beat:
    build: .
    container_name: conexiones_prod_celery_beat
    command: uv run celery -A conexiones beat -l info
    volumes:
      - ./clientes:/app/clientes
      - ./conexiones:/app/conexiones
      - ./facturacion:/app/facturacion
      - ./instalaciones:/app/instalaciones
      - ./planes:/app/planes
      - ./templates:/app/templates
      - ./base:/app/base
      - ./usuarios:/app/usuarios
      - ./nucleo_admin:/app/nucleo_admin
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db
      - redis
    restart: always

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy
    container_name: conexiones_prod_wg_easy
    env_file:
      - .env
    environment:
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=1.1.1.1
    ports:
      - "51820:51820/udp"
      - "127.0.0.1:51821:51821/tcp"
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - wg_easy_data:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    restart: always

volumes:
  static_data:
  postgres_data:
  wg_easy_data:
